<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Spray</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%; height: 100vh;
            background: #ffffff;
            font: 16px/1.8 'Georgia', serif;
            cursor: none;
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        canvas.overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        #spray-canvas  { z-index: 10; }
        #flower-canvas { z-index: 11; }
        #fly-canvas    { z-index: 12; }

        #cursor-nozzle {
            position: fixed; pointer-events: none;
            z-index: 1000; width: 30px; height: 40px;
            margin-top: -20px; margin-left: -15px; opacity: 0.9;
        }

        .container {
            position: relative; z-index: 5;
            max-width: 900px; padding: 60px; width: 100%;
        }

        p {
            font-size: 16px; line-height: 1.8; color: #333;
            text-align: left; margin-bottom: 20px;
            word-spacing: 2px; user-select: none;
        }

        @media (max-width: 600px) {
            .container { padding: 24px 18px; }
            p { font-size: 14px; line-height: 1.7; margin-bottom: 16px; }
            .cloud-1 { width: 90px; height: 45px; }
            .cloud-2 { width: 70px; height: 35px; }
            .cloud-3 { width: 100px; height: 50px; }
        }

        .cl { display: inline; }

        /* Clouds */
        .cloud {
            position: fixed; pointer-events: none; z-index: 1; opacity: 0.6;
        }
        .cloud-1 { top:10%; left:5%;   width:140px; height:70px; animation: drift 15s ease-in-out infinite; }
        .cloud-2 { top:25%; right:8%;  width:110px; height:55px; animation: drift-r 20s ease-in-out infinite; }
        .cloud-3 { bottom:20%; left:10%; width:160px; height:80px; animation: drift 25s ease-in-out infinite; }

        @keyframes drift   { 0%,100%{transform:translateX(0)}  50%{transform:translateX(30px)} }
        @keyframes drift-r { 0%,100%{transform:translateX(0)}  50%{transform:translateX(-25px)} }
    </style>
</head>
<body>

    <canvas id="spray-canvas"  class="overlay"></canvas>
    <canvas id="flower-canvas" class="overlay"></canvas>
    <canvas id="fly-canvas"    class="overlay"></canvas>

    <!-- Clouds -->
    <div class="cloud cloud-1"><svg viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="20" width="10" height="10" fill="#f0f0f0"/>
        <rect x="20" y="15" width="10" height="15" fill="#f0f0f0"/>
        <rect x="30" y="10" width="10" height="20" fill="#f0f0f0"/>
        <rect x="40" y="15" width="10" height="15" fill="#f0f0f0"/>
        <rect x="50" y="20" width="10" height="10" fill="#f0f0f0"/>
        <rect x="20" y="25" width="30" height="10" fill="#fff"/>
        <rect x="15" y="30" width="40" height="8"  fill="#f5f5f5"/>
    </svg></div>
    <div class="cloud cloud-2"><svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
        <rect x="5"  y="15" width="8" height="12" fill="#e8e8e8"/>
        <rect x="15" y="10" width="8" height="18" fill="#e8e8e8"/>
        <rect x="25" y="8"  width="8" height="20" fill="#e8e8e8"/>
        <rect x="35" y="10" width="8" height="18" fill="#e8e8e8"/>
        <rect x="45" y="15" width="8" height="12" fill="#e8e8e8"/>
        <rect x="12" y="22" width="38" height="10" fill="#f5f5f5"/>
    </svg></div>
    <div class="cloud cloud-3"><svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="25" width="12" height="15" fill="#f0f0f0"/>
        <rect x="35" y="15" width="12" height="25" fill="#f0f0f0"/>
        <rect x="50" y="10" width="12" height="30" fill="#f0f0f0"/>
        <rect x="65" y="15" width="12" height="25" fill="#f0f0f0"/>
        <rect x="80" y="25" width="12" height="15" fill="#f0f0f0"/>
        <rect x="30" y="35" width="60" height="12" fill="#fff"/>
        <rect x="25" y="45" width="70" height="10" fill="#f5f5f5"/>
    </svg></div>

    <div id="cursor-nozzle">
        <svg viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="5" width="14" height="20" rx="2" fill="#4a9eff" stroke="#2c5aa0" stroke-width="1.5"/>
            <rect x="11" y="2" width="8" height="5" rx="1" fill="#2c5aa0" stroke="#1a3a60" stroke-width="1"/>
            <circle cx="15" cy="1" r="2" fill="#ffd700" stroke="#cc8800" stroke-width="1"/>
            <rect x="10" y="15" width="10" height="8" fill="#a8d8ff" opacity="0.6"/>
        </svg>
    </div>

    <div class="container">
        <div id="paragraphs"></div>
    </div>

<script>
/* ── TEXT ──────────────────────────────────────────────── */
const PARAGRAPHS = [
    "The morning sun painted golden strokes across the meadow, where wildflowers swayed in an invisible dance. A gentle breeze carried the scent of honeysuckle and fresh earth, awakening the senses to the beauty hidden within nature's embrace. Each blade of grass held tiny droplets of dew, like scattered diamonds waiting to catch the light.",
    "Birds sang their melodies from the twisted branches of ancient trees, their songs echoing through the valley like whispered secrets. The forest floor was a carpet of moss and fallen leaves, telling stories of seasons past and seasons yet to come. Silence, true silence, was a luxury found only in these forgotten corners of the world.",
    "As twilight descended, the stars began their nightly performance, piercing through the darkness like tiny flames. The moon rose slowly, casting silver shadows across the sleeping landscape. The world seemed to hold its breath, waiting for the magical hour when dreams blend seamlessly with reality.",
    "In the stillness of the evening, one could hear the subtle rustle of creatures preparing for night, the gentle lap of water against distant shores. Nature's rhythm continued its eternal dance, indifferent to the passage of time. Each moment was a gift, precious and fleeting, soon to fade into memory."
];
const FLOWER_SRCS = ['rose.png','sunflower.png','nature.png','nature (1).png','flower-pot.png'];
const SPRAY_R    = 60;
const SPRAY_R_SQ = SPRAY_R * SPRAY_R;
// 20 spread angles for variety
const DIR_ANGLES = [-75,-50,-25,-10,0,10,25,50,75,-65,65,-35,35,15,-15,55,-55,5,-5,40];

/* ── CANVASES ───────────────────────────────────────────── */
const sprayCanvas  = document.getElementById('spray-canvas');
const flowerCanvas = document.getElementById('flower-canvas');
const flyCanvas    = document.getElementById('fly-canvas');
const sCtx = sprayCanvas.getContext('2d');
const fCtx = flowerCanvas.getContext('2d');
const lCtx = flyCanvas.getContext('2d');

function resizeCanvases() {
    const w = window.innerWidth, h = window.innerHeight;
    sprayCanvas.width  = flowerCanvas.width  = flyCanvas.width  = w;
    sprayCanvas.height = flowerCanvas.height = flyCanvas.height = h;
}
resizeCanvases();
window.addEventListener('resize', () => { resizeCanvases(); measureAndStart(); });

/* ── PRELOAD FLOWER IMAGES ──────────────────────────────── */
const flowerImgs = {};
FLOWER_SRCS.forEach(src => {
    const img = new Image();
    img.src = src;
    flowerImgs[src] = img;
});

/* ── BUILD PARAGRAPHS — each non-space char gets a span ── */
const container = document.getElementById('paragraphs');
PARAGRAPHS.forEach((text, i) => {
    const p = document.createElement('p');
    p.setAttribute('data-para', i);
    // Build inline — no whitespace between tags to avoid spacing gaps
    let html = '';
    for (let j = 0; j < text.length; j++) {
        const ch = text[j];
        if (ch === ' ') { html += ' '; }
        else { html += '<span class="cl">' + ch + '</span>'; }
    }
    p.innerHTML = html;
    container.appendChild(p);
});

/* ── CHAR STATE ─────────────────────────────────────────── */
// Each entry: { x, y, charH, paraIdx, src, charCode, el,
//               bloomed, scale, wobble, flying }
let chars = [];
let bloomedList = []; // subset of chars that are bloomed — fast flower draw

function measureAndStart() {
    chars = [];
    bloomedList = [];
    allBloomedTriggered = false;
    bCount = 0;

    document.querySelectorAll('#paragraphs p').forEach((p, paraIdx) => {
        p.querySelectorAll('span.cl').forEach(span => {
            const r = span.getBoundingClientRect();
            if (r.width === 0) return;
            chars.push({
                x:        r.left + r.width  / 2,
                y:        r.top  + r.height / 2,
                charH:    r.height,
                paraIdx,
                src:      FLOWER_SRCS[Math.floor(Math.random() * FLOWER_SRCS.length)],
                charCode: span.textContent.charCodeAt(0),
                el:       span,
                bloomed:  false,
                scale:    0,
                wobble:   Math.random() * Math.PI * 2,
                flying:   false
            });
        });
    });
}

/* ── SPRAY PARTICLES ────────────────────────────────────── */
// Pool-based particles: reuse dead slots to avoid GC churn
const MAX_PARTICLES = 300;
const px   = new Float32Array(MAX_PARTICLES);
const py   = new Float32Array(MAX_PARTICLES);
const pvx  = new Float32Array(MAX_PARTICLES);
const pvy  = new Float32Array(MAX_PARTICLES);
const pr   = new Float32Array(MAX_PARTICLES);
const plif = new Float32Array(MAX_PARTICLES); // lifetime remaining
const pmax = new Float32Array(MAX_PARTICLES); // max lifetime
let   pHead = 0; // ring buffer head

function emitParticle(x, y, vx, vy) {
    const n = pHead % MAX_PARTICLES;
    pHead++;
    px[n] = x; py[n] = y; pvx[n] = vx; pvy[n] = vy;
    pr[n] = Math.random() * 2 + 0.5;
    plif[n] = pmax[n] = Math.random() * 30 + 20;
}

/* ── MOUSE ──────────────────────────────────────────────── */
let mx = innerWidth/2, my = innerHeight/2, mvx = 0, mvy = 0;
const nozzle = document.getElementById('cursor-nozzle');

document.addEventListener('mousemove', e => {
    mvx = e.clientX - mx;
    mvy = e.clientY - my;
    mx  = e.clientX;
    my  = e.clientY;
    nozzle.style.left = mx + 'px';
    nozzle.style.top  = my + 'px';

    // Emit water particles
    const baseAngle = Math.atan2(mvy, mvx);
    for (let i = 0; i < 4; i++) {
        const a  = baseAngle + (Math.PI / 6) * (i - 1.5);
        const sp = Math.random() * 1.5 + 1;
        emitParticle(mx, my, Math.cos(a)*sp + mvx*0.08, Math.sin(a)*sp + mvy*0.08);
    }

    // Check bloom proximity
    if (!allBloomedTriggered && chars.length > 0) {
        let newCount = 0;
        for (let i = 0; i < chars.length; i++) {
            const c = chars[i];
            if (c.bloomed || c.flying) continue;
            const dx = mx - c.x, dy = my - c.y;
            if (dx*dx + dy*dy < SPRAY_R_SQ) {
                c.bloomed = true;
                bloomedList.push(c);
                newCount++;
            }
        }
        if (newCount > 0) popSound();
        if (newCount > 0 && bloomedList.length === chars.length) {
            allBloomedTriggered = true;
            setTimeout(pluckAllFlowers, 1500);
        }
    }
});

/* ── TOUCH ──────────────────────────────────────────────── */
function handleTouch(e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (!touch) return;

    const tx = touch.clientX, ty = touch.clientY;
    mvx = tx - mx;
    mvy = ty - my;
    mx = tx;
    my = ty;

    nozzle.style.left = mx + 'px';
    nozzle.style.top  = my + 'px';

    const baseAngle = Math.atan2(mvy, mvx);
    for (let i = 0; i < 4; i++) {
        const a  = baseAngle + (Math.PI / 6) * (i - 1.5);
        const sp = Math.random() * 1.5 + 1;
        emitParticle(mx, my, Math.cos(a)*sp + mvx*0.08, Math.sin(a)*sp + mvy*0.08);
    }

    if (!allBloomedTriggered && chars.length > 0) {
        let newCount = 0;
        for (let i = 0; i < chars.length; i++) {
            const c = chars[i];
            if (c.bloomed || c.flying) continue;
            const dx = mx - c.x, dy = my - c.y;
            if (dx*dx + dy*dy < SPRAY_R_SQ) {
                c.bloomed = true;
                bloomedList.push(c);
                newCount++;
            }
        }
        if (newCount > 0) popSound();
        if (newCount > 0 && bloomedList.length === chars.length) {
            allBloomedTriggered = true;
            setTimeout(pluckAllFlowers, 1500);
        }
    }
}

document.addEventListener('touchstart', handleTouch, { passive: false });
document.addEventListener('touchmove',  handleTouch, { passive: false });

/* ── ALL BLOOMED CHECK ──────────────────────────────────── */
let allBloomedTriggered = false;

/* ── FLY-AWAY (canvas balloons, typed arrays) ───────────── */
const MAX_BALLOONS = 2000;
const bx  = new Float32Array(MAX_BALLOONS);
const by  = new Float32Array(MAX_BALLOONS);
const bvx = new Float32Array(MAX_BALLOONS);
const bvy = new Float32Array(MAX_BALLOONS);
const bwb = new Float32Array(MAX_BALLOONS); // wobble phase
const bws = new Float32Array(MAX_BALLOONS); // wobble speed
const bsi = new Uint8Array(MAX_BALLOONS);   // flower src index
const bch = new Uint16Array(MAX_BALLOONS);  // char code
let   bCount = 0;
let   flyActive = false;

function flyLoop() {
    lCtx.clearRect(0, 0, flyCanvas.width, flyCanvas.height);
    lCtx.font = '15px Georgia,serif';
    lCtx.fillStyle = '#333';
    lCtx.textAlign = 'center';
    lCtx.textBaseline = 'top';
    lCtx.strokeStyle = 'rgba(150,150,150,0.6)';
    lCtx.lineWidth = 0.8;

    const H = flyCanvas.height + 60;
    let alive = 0;

    for (let i = 0; i < bCount; i++) {
        bwb[i] += bws[i];
        bx[i]  += bvx[i] + Math.sin(bwb[i]) * 0.3;
        by[i]  += bvy[i];

        if (by[i] < -H) continue;
        alive++;

        lCtx.save();
        lCtx.translate(bx[i], by[i]);
        lCtx.rotate(Math.sin(bwb[i]) * 0.05);

        // flower image
        const img = flowerImgs[FLOWER_SRCS[bsi[i]]];
        if (img.complete && img.naturalWidth > 0) {
            lCtx.drawImage(img, -9, -26, 18, 18);
        }

        // string
        lCtx.beginPath();
        lCtx.moveTo(0, -8);
        lCtx.lineTo(0, 3);
        lCtx.stroke();

        // letter
        lCtx.fillText(String.fromCharCode(bch[i]), 0, 3);

        lCtx.restore();
    }

    if (alive > 0) {
        requestAnimationFrame(flyLoop);
    } else {
        flyActive = false;
        lCtx.clearRect(0, 0, flyCanvas.width, flyCanvas.height);
    }
}

function pluckAllFlowers() {
    blowAudio.currentTime = 0;
    blowAudio.play().catch(() => {});
    // Group by paragraph
    const byPara = {};
    for (let i = 0; i < chars.length; i++) {
        const c = chars[i];
        if (!c.bloomed) continue;
        const p = c.paraIdx;
        if (!byPara[p]) byPara[p] = [];
        byPara[p].push(c);
    }

    const paraKeys = Object.keys(byPara).sort((a, b) => a - b);

    paraKeys.forEach((pIdx, pi) => {
        const group = byPara[pIdx];

        setTimeout(() => {
            group.forEach((c, li) => {
                const angle = DIR_ANGLES[li % DIR_ANGLES.length];
                const rad   = (angle * Math.PI) / 180;
                const speed = 1.8 + Math.random() * 0.7;

                setTimeout(() => {
                    c.flying = true; // hides from flower canvas
                    // Hide just this letter's span the moment its balloon launches
                    if (c.el) c.el.style.visibility = 'hidden';

                    if (bCount < MAX_BALLOONS) {
                        const n = bCount++;
                        bx[n]  = c.x;
                        by[n]  = c.y;
                        bvx[n] = Math.sin(rad) * speed;
                        bvy[n] = -(Math.abs(Math.cos(rad)) * speed + 1.0);
                        bwb[n] = Math.random() * Math.PI * 2;
                        bws[n] = 0.014 + Math.random() * 0.012;
                        bsi[n] = FLOWER_SRCS.indexOf(c.src);
                        bch[n] = c.charCode;
                    }

                    if (!flyActive) {
                        flyActive = true;
                        requestAnimationFrame(flyLoop);
                    }
                }, li * 12);
            });
        }, pi * 200);
    });
}

/* ── FLOWER CANVAS LOOP ─────────────────────────────────── */
// Only iterates bloomedList (not all 800 chars)
let windPhase = 0;

function flowerLoop() {
    fCtx.clearRect(0, 0, flowerCanvas.width, flowerCanvas.height);
    windPhase += 0.012;

    for (let i = 0; i < bloomedList.length; i++) {
        const c = bloomedList[i];
        if (c.flying) continue;

        // Grow to full size
        if (c.scale < 1) c.scale = Math.min(1, c.scale + 0.07);

        // Wind sway — top moves, bottom stays fixed at letter
        c.wobble += 0.018;
        const sway = Math.sin(c.wobble + windPhase) * 0.12;

        const img = flowerImgs[c.src];
        if (!img.complete || img.naturalWidth === 0) continue;

        const fw = 18 * c.scale;
        const fh = 18 * c.scale;

        fCtx.save();
        // Anchor at base of flower (bottom of image = top of letter)
        fCtx.translate(c.x, c.y - c.charH * 0.2);
        fCtx.rotate(sway);
        fCtx.drawImage(img, -fw/2, -fh, fw, fh);
        fCtx.restore();
    }

    requestAnimationFrame(flowerLoop);
}

/* ── SPRAY CANVAS LOOP ──────────────────────────────────── */
function sprayLoop() {
    sCtx.clearRect(0, 0, sprayCanvas.width, sprayCanvas.height);
    sCtx.fillStyle = 'rgba(100,200,255,1)';

    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (plif[i] <= 0) continue;
        plif[i]--;
        pvy[i] += 0.08;
        px[i]  += pvx[i];
        py[i]  += pvy[i];

        const alpha = (plif[i] / pmax[i]) * 0.7;
        sCtx.globalAlpha = alpha;
        sCtx.beginPath();
        sCtx.arc(px[i], py[i], pr[i], 0, Math.PI * 2);
        sCtx.fill();
    }
    sCtx.globalAlpha = 1;

    requestAnimationFrame(sprayLoop);
}

/* ── BLOW SOUND ─────────────────────────────────────────── */
const blowAudio = new Audio('scratchonix-air-blow-380645.mp3');
blowAudio.volume = 0.5;
blowAudio.playbackRate = 1.5;

/* ── POP SOUND ──────────────────────────────────────────── */
const popAudio = new Audio('u_xio2tir4to-bubble-pop-389501.mp3');
popAudio.volume = 0.5;
let lastPopTime = 0;
function popSound() {
    const now = Date.now();
    if (now - lastPopTime < 150) return;
    lastPopTime = now;
    const s = popAudio.cloneNode();
    s.volume = 0.1 + Math.random() * 0.08;
    s.play().catch(() => {});
}

/* ── WIND SOUND ─────────────────────────────────────────── */
const windAudio = new Audio('storegraphic-soft-wind-318856.mp3');
windAudio.loop = true;
windAudio.volume = 0.35;
function unlockAudio() { windAudio.play().catch(() => {}); }
document.addEventListener('click',      unlockAudio, { once: true });
document.addEventListener('mousemove',  unlockAudio, { once: true });
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });

/* ── INIT ───────────────────────────────────────────────── */
setTimeout(() => {
    measureAndStart();
    flowerLoop();
    sprayLoop();
}, 200);
</script>
</body>
</html>
